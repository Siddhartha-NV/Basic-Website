<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Your Cart</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav>
        <div class="logo"><a href="index.html">Amazon</a></div>
    </nav>

    <div class="container">
        <h1>Shopping Cart</h1>
        <div id="cart-items-list">
            <!-- JS will render items from LocalStorage here -->
        </div>
        <div class="cart-summary">
            <h3>Total: $<span id="cart-total-amount">0</span></h3>
            <button id="checkout-btn" onclick="location.href='checkout.html'">Proceed to Checkout</button>
        </div>
    </div>

    <script type="module" src="js/cart.js"></script>
</body>
</html>
